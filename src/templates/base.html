{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking</title>
  <link rel="shortcut icon" href="{% static 'img/favicon.svg' %}" />
  <script>
    // ✅ Prevent FOUC: apply dark mode before CSS loads
    document.documentElement.classList.toggle(
      "dark",
      localStorage.theme === "dark" ||
      (!("theme" in localStorage) &&
        window.matchMedia("(prefers-color-scheme: dark)").matches),
    );
  </script>
  <style>
    [x-cloak] {
        display: none !important;
    }
  </style>
  <link rel="stylesheet" href="{% static 'css/ui.css' %}">
  <script src="{% static 'vendor/htmx/htmx.min.js' %}" defer></script>
  <script src="{% static 'vendor/alpine/alpine.min.js' %}" defer></script>
  <script src="{% static 'vendor/sweetalert/sweetalert.min.js' %}"></script>
  <script src="{% static 'vendor/sortable/sortablejs.min.js' %}"></script>
  <link rel="stylesheet" href="{% static 'vendor/sweetalert/sweetalert.min.css' %}">
  <link rel="stylesheet" href="{% static 'vendor/flatpickr/flatpickr.min.css' %}">
  <script src="{% static 'vendor/flatpickr/flatpickr.js' %}"></script>
</head>
<body x-data="themeSwitcher()" class="h-screen">
    {% block main_content %}{% endblock main_content %}
    <script>
      function themeSwitcher() {
        return {
          darkMode: document.documentElement.classList.contains("dark"),
          toggleTheme() {
            this.darkMode = !this.darkMode;
            document.documentElement.classList.toggle("dark", this.darkMode);
            localStorage.theme = this.darkMode ? "dark" : "light";
          }
        };
      }
    </script>
    <script>
    function showToast(type, message) {

      let container = document.getElementById("toast-container")

      if (!container) {
        container = document.createElement("div")
        container.id = "toast-container"
        container.className = "fixed top-6 right-6 z-[9999] flex flex-col gap-3"
        document.body.appendChild(container)
      }

      const toast = document.createElement("div")

      toast.className = `toast toast-${type ?? "success"} toast-enter`

      const icons = {
        success: "✓",
        danger: "✕",
        warning: "⚠"
      }

      toast.innerHTML = `
        <span class="toast-icon">${icons[type] ?? icons.success}</span>
        <span class="toast-message">${message}</span>
      `

      container.appendChild(toast)

      setTimeout(() => {
        toast.classList.remove("toast-enter")
        toast.classList.add("toast-exit")

        setTimeout(() => toast.remove(), 250)
      }, 3500)
    }
    </script>
    <script>
    function initFlatpickr() {
        document.querySelectorAll(".datepicker").forEach(el => {
            if (el._flatpickr) {
                el._flatpickr.destroy();
                el._flatpickr = null;
            }
            const modal = document.getElementById('global-modal');
            el._flatpickr = flatpickr(el, {
                dateFormat: "d.m.Y",
                appendTo: modal
            });
        });
    }

    document.addEventListener("htmx:afterSwap", function() {
        setTimeout(initFlatpickr, 50);
    });
    document.addEventListener("DOMContentLoaded", initFlatpickr);
    </script>
    {% block message_scripts %}{% endblock message_scripts %}
    {% block scripts %}
    {% endblock scripts %}
    {% block modal_scripts %}
    {% endblock modal_scripts %}
</body>
</html>
