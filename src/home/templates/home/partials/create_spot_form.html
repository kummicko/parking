<form hx-post="{% url 'home:create_spot' %}"
      hx-target="#modal-body"
      hx-swap="innerHTML">
  {% csrf_token %}

  <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">

    <div class="flex flex-col gap-1">
      <label class="form-label">Broj mesta <span class="text-danger">*</span></label>
      <input type="text" name="number" value="{{ form.number.value|default:'' }}"
             class="form-input {% if form.number.errors %}border-danger ring-1 ring-danger{% endif %}"
             placeholder="npr. A-01" autofocus>
      {% for e in form.number.errors %}
        <p class="text-xs text-danger mt-0.5">{{ e }}</p>
      {% endfor %}
    </div>

    <div class="flex flex-col gap-1">
      <label class="form-label">Status</label>
      <div class="flex items-center gap-2 mt-2">
        <input type="checkbox" name="is_active" id="id_is_active" 
               {% if form.is_active.value != False %}checked{% endif %}
               class="w-4 h-4 text-primary border-gray-300 rounded focus:ring-primary">
        <label for="id_is_active" class="text-sm text-gray-700">Aktivno mesto</label>
      </div>
      {% for e in form.is_active.errors %}
        <p class="text-xs text-danger mt-0.5">{{ e }}</p>
      {% endfor %}
    </div>

    <div class="flex flex-col gap-1 sm:col-span-2">
      <label class="form-label">Napomena</label>
      <textarea name="notes" rows="2"
                class="form-input resize-none"
                placeholder="Opciona napomena o mestu...">{{ form.notes.value|default:'' }}</textarea>
      {% for e in form.notes.errors %}
        <p class="text-xs text-danger mt-0.5">{{ e }}</p>
      {% endfor %}
    </div>

  </div>

  <div class="flex justify-end gap-2 pt-3 border-t border-default">
    <button type="button" onclick="closeGlobalModal()"
            class="btn btn-gray btn-sm">Otkaži</button>
    <button type="submit"
            class="btn btn-primary btn-sm">
      Sačuvaj mesto
    </button>
  </div>
</form>
